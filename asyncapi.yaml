        Format: [zoneID_len][zoneID][mode][7×{pointCount,[time,value]×N}][optional: exceptionCount,[start(8),end(8),value]×N]
        The exception block is backward-compatible: if no data remains after the 7-day setpoints, NRF assumes 0 exceptions.
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/PlanningPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
