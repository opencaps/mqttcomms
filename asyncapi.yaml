      name: Sync Planning Group
      title: Sync planning group (0x06)
      summary: |
        Create, update, or remove a planning group. Sent to ESP for UI display.
        New format includes embedded plannings list:
        [op(1)][groupID_len(1)][groupID][name_len(1)][name][activated(1)]
        [num_plannings(1)]{[planningID_len(1)][planningID][zoneID_len(1)][zoneID][factor_len(1)][factor]}×N
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/PlanningGroupPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x06'
      x-opencaps-op: '0x01'

    ClearAllPlannings:
      name: Clear All Plannings
      title: Clear all plannings (0x0B)
      summary: |
        Clear all zone plannings and exceptions from NRF memory and NVS.

        **Empty body** (backward compatible): clears all plannings/exceptions, stops regulation.

        **With hold targets body**: clears all plannings/exceptions, then sets a permanent
        exception per zone to hold at the given target value. Used on group deactivation/deletion
        to match Hemis behavior (last target persists).

        Body format when hold targets are present:
        ```
        [num_zones: 1 byte]
          [zone_id_len: 1 byte][zone_id: N bytes][target_value: 1 byte]
          ... repeated num_zones times
        ```
        - `target_value` is in 0.5°C steps (e.g., 44 = 22.0°C)
        - Each zone gets a permanent exception (start=0, end=INT64_MAX) persisted in NVS
      contentType: application/octet-stream
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x0B'
      x-opencaps-op: '0x01'

    GroupActivatedEvent:
      name: Group Activated Event
      title: Group activated on ESP (0x08)
      summary: |
        Inbound event: user activated a planning group on the ESP touchscreen.
        Body contains raw group ID string (MongoDB ObjectID hex).
        NRF is relay-only — does not update local regulation on activate.
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/GroupIdPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x08'
      x-opencaps-op: '0x05'

    GroupDeactivatedEvent:
      name: Group Deactivated Event
      title: Group deactivated on ESP (0x0A)
      summary: |
        Inbound event: user deactivated a planning group on the ESP touchscreen.
        Body contains raw group ID string (MongoDB ObjectID hex).
        NRF is relay-only — does not clear local regulation on deactivate.
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/GroupIdPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x0A'
      x-opencaps-op: '0x05'

    ExceptionCreatedEvent:
      name: Exception Created Event
      title: Exception created on ESP (0x09)
      summary: |
        Inbound event: user created a temperature override on the ESP touchscreen.
        Format: [zoneID_len][zoneID][mode][factor_len][factor][exceptionCount][start(8),end(8),value]×N
        NRF updates local regulation AND relays to MQTT.
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/ExceptionsPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
