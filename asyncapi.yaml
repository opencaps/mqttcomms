      title: Set zone exceptions (0x01)
      summary: |
        Send exception-only update for a zone. Includes factor field for multi-factor zone support.
        Format: [zoneID_len][zoneID][mode][factor_len][factor][exceptionCount,[start(8),end(8),value]×N]
      contentType: application/octet-stream
