      name: Sync Groups Hash
      title: Groups hash for sync check (0x0C)
      summary: |
        Bridge sends CRC32-IEEE hash of its stored planning groups on MQTT connect.
        EasySched compares with its own hash and resyncs only on mismatch.
        Body: 4 bytes, little-endian CRC32-IEEE hash.
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/GroupsHashPayload'
      headers:
