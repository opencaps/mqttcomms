      x-opencaps-op: '0x04'

    BuildingNameResponse:
      name: Building Name Response
      title: Building name response
      summary: Response containing building name
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/BuildingNamePayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x01'
      x-opencaps-op: '0x05'

    FullUiInfoRequest:
      name: Full UI Info Request
      title: Request full UI information
      summary: Bridge requests building name and zone list
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/BuildingIdPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x02'
      x-opencaps-op: '0x04'

    FullUiInfoResponse:
      name: Full UI Info Response
      title: Full UI information response
      summary: Response containing building name and zone list
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/FullUiInfoPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x02'
      x-opencaps-op: '0x05'

    WeatherRequest:
      name: Weather Request
      title: Request weather data
      summary: Bridge requests weather data for a building
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/BuildingIdPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x03'
      x-opencaps-op: '0x04'

    WeatherResponse:
      name: Weather Response
      title: Weather data response
      summary: Response containing weather data (temperature, humidity, icon)
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/WeatherPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x03'
      x-opencaps-op: '0x05'

    SunTimesRequest:
      name: Sun Times Request
      title: Request sunrise/sunset times
      summary: Bridge requests sunrise and sunset times for a building
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/BuildingIdPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x04'
      x-opencaps-op: '0x04'

    SunTimesResponse:
      name: Sun Times Response
      title: Sunrise/sunset times response
      summary: Response containing sunrise and sunset timestamps
      contentType: application/octet-stream
      payload:
        $ref: '#/components/schemas/SunTimesPayload'
      headers:
        $ref: '#/components/schemas/MessageHeader'
      traits:
        - $ref: '#/components/messageTraits/commonMessage'
      x-opencaps-type: '0x04'
      x-opencaps-op: '0x05'

  # ============================================================================
  # MESSAGE TRAITS
  # ============================================================================
  messageTraits:
    commonMessage:
      headers:
        type: object
        properties:
          magic:
            type: integer
            format: uint32
            const: 0x42524144
            description: Magic number identifying valid OpenCaps messages
          seq:
            type: integer
            format: uint16
            description: Sequence number for message ordering
          op:
            type: integer
            format: uint8
            description: Operation type
            enum: [0x01, 0x02, 0x03, 0x04, 0x05]
          type:
            type: integer
            format: uint8
            description: Method type code
          length:
            type: integer
            format: uint16
            description: Body length in bytes

  # ============================================================================
  # SCHEMAS
  # ============================================================================
  schemas:
    # --------------------------------------------------------------------------
    # COMMON SCHEMAS
    # --------------------------------------------------------------------------
    MessageHeader:
      type: object
      description: |
        Standard message header (10 bytes total).
        All multi-byte values are big-endian.
      properties:
        magic:
          type: integer
          format: uint32
          const: 0x42524144
          description: Magic number "BRAD" (0x42524144)
        seq:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          description: Sequence number for tracking message order
        op:
          $ref: '#/components/schemas/OperationType'
        type:
          type: integer
          format: uint8
          description: Method type code
        length:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          description: Length of the body in bytes

    OperationType:
      type: integer
      format: uint8
      description: Operation type code
      enum:
        - 0x01  # REQACK - Request requiring ACK
        - 0x02  # NOACK - No ACK required
        - 0x03  # ISACK - Is an ACK message
        - 0x04  # REQRESP - Request requiring response
        - 0x05  # ISRESP - Is a response message
      x-enum-descriptions:
        - REQACK: Message requires acknowledgment
        - NOACK: Message does not require acknowledgment
        - ISACK: Message is an acknowledgment
        - REQRESP: Message requires a response
        - ISRESP: Message is a response

    AckPayload:
      type: object
      description: Standard acknowledgment payload
      properties:
        returnCode:
          $ref: '#/components/schemas/ReturnCode'

    ReturnCode:
      type: integer
      format: uint8
      description: Return code for ACK messages
      enum:
        - 0x00  # No error
        - 0x01  # CRC/magic error
        - 0x02  # Critical error
      x-enum-descriptions:
        - NO_ERROR: Operation completed successfully
        - CRC_ERROR: CRC or magic number validation failed
        - CRITICAL_ERROR: Critical error occurred

    StatusCodePayload:
      type: object
      description: Status code payload
      properties:
        status:
          type: integer
          format: uint8
          description: Status code (0x00 = OK)

    EmptyPayload:
      type: object
      description: Empty payload (no body)
      properties: {}

    DeviceClass:
      type: integer
      format: uint8
      description: Device class identifier
      enum:
        - 0x00  # Relay actuator ON/OFF
        - 0x01  # Pilot wire relay ON/OFF
        - 0x02  # Pilot wire relay PLANNING
        - 0x80  # Temperature sensor
        - 0x81  # Reserved
      x-enum-descriptions:
        - ACTUATOR_RELAY_ONOFF: Relay actuator with ON/OFF control
        - ACTUATOR_PILOT_WIRE_ONOFF: Pilot wire relay with ON/OFF control
        - ACTUATOR_PILOT_WIRE_PLANNING: Pilot wire relay with planning mode
        - SENSOR_TEMPERATURE: Temperature sensor
        - RESERVED: Reserved for future use

    # --------------------------------------------------------------------------
    # ADMIN SCHEMAS
    # --------------------------------------------------------------------------
    UpdateInitPayload:
      type: object
      description: Firmware update initialization payload
      properties:
        binaryLength:
          type: integer
          format: uint32
          description: Total size of the firmware binary in bytes

    UpdatePacketPayload:
      type: object
      description: Firmware update packet payload
      properties:
        data:
          type: string
          format: binary
          maxLength: 512
          description: Firmware data chunk (max 512 bytes)

    Esp32UpdateEndPayload:
      type: object
      description: ESP32 firmware update end payload with SHA256 hash
      properties:
        sha256:
          type: string
          format: binary
          minLength: 64
          maxLength: 64
          description: SHA256 hash of the firmware binary (64 bytes)

    BridgeInfoPayload:
      type: object
      description: Bridge information response (JSON in body)
      properties:
        product_name:
          type: string
          description: Product name
        product_rev:
          type: string
          description: Hardware revision
        firmware_app_version:
          type: string
          description: Application firmware version
        firmware_type:
          type: string
          description: Firmware type
        firmware_bootloader_version:
          type: string
          description: Bootloader version

    EntityIdPayload:
      type: object
      description: Entity ID payload
      properties:
        entityId:
          type: string
          description: Entity ID as ASCII string

    EntityIdReadyPayload:
      type: object
      description: Entity ID readiness status
      properties:
        ready:
          type: integer
          format: uint8
          enum: [0, 1]
          description: '0x00 = entity ID not set, 0x01 = entity ID set and ready'

    # --------------------------------------------------------------------------
    # DEVICE SCHEMAS
    # --------------------------------------------------------------------------
    AddEnoceanNewTypePayload:
      type: object
      description: Add EnOcean device with new type
      properties:
        class:
          $ref: '#/components/schemas/DeviceClass'
        id:
          type: integer
          format: uint32
          description: EnOcean device ID (4 bytes)
        zoneLength:
          type: integer
          format: uint8
          description: Length of zone ID string
        zone:
          type: string
          description: Zone ID as ASCII string
        translationFormula:
          type: string
          format: binary
          description: Translation formula for the device type

    AddEnoceanExistingTypePayload:
      type: object
      description: Add EnOcean device with existing type
      properties:
        class:
          $ref: '#/components/schemas/DeviceClass'
        id:
          type: integer
          format: uint32
          description: EnOcean device ID (4 bytes)
        zoneLength:
          type: integer
          format: uint8
          description: Length of zone ID string
        zone:
          type: string
          description: Zone ID as ASCII string
        existingId:
          type: integer
          format: uint32
          description: ID of existing device with same type

    DeleteEnoceanPayload:
      type: object
      description: Delete EnOcean device payload
      properties:
        class:
          $ref: '#/components/schemas/DeviceClass'
        id:
          type: integer
          format: uint32
          description: EnOcean device ID (4 bytes)
        zoneLength:
          type: integer
          format: uint8
          description: Length of zone ID string
        zone:
          type: string
          description: Zone ID as ASCII string

    ChangeZonePayload:
      type: object
      description: Change device zone payload
      properties:
        class:
          $ref: '#/components/schemas/DeviceClass'
        id:
          type: integer
          format: uint32
          description: EnOcean device ID (4 bytes)
        oldZoneLength:
          type: integer
          format: uint8
          description: Length of old zone ID string
        oldZone:
          type: string
          description: Old zone ID as ASCII string
        newZoneLength:
          type: integer
          format: uint8
          description: Length of new zone ID string
        newZone:
          type: string
          description: New zone ID as ASCII string

    AddErlPayload:
      type: object
      description: Add ERL device payload
      properties:
        comId:
          type: string
          format: binary
          minLength: 16
          maxLength: 16
          description: ERL MAC EUI64 (16 bytes)
        secretKey:
          type: string
          format: binary
          minLength: 32
          maxLength: 32
          description: Thread network secret key (32 bytes)

    AddEnoceanByEepPayload:
      type: object
      description: Add EnOcean device by EEP profile
      properties:
        class:
          $ref: '#/components/schemas/DeviceClass'
        id:
          type: integer
          format: uint32
          description: EnOcean device ID (4 bytes)
        zoneLength:
          type: integer
          format: uint8
          description: Length of zone ID string
        zone:
          type: string
          description: Zone ID as ASCII string
        eep:
          type: string
          pattern: '^[A-F0-9]{2}-[A-F0-9]{2}-[A-F0-9]{2}$'
          description: EnOcean Equipment Profile (e.g., "A5-09-0C")
          example: "A5-09-0C"

    ZonePayload:
      type: object
      description: Zone identifier payload
      properties:
        zoneLength:
          type: integer
          format: uint8
          description: Length of zone ID string
        zone:
          type: string
          description: Zone ID as ASCII string

    DeviceListPayload:
      type: object
      description: Device list response payload
      properties:
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceInfo'

    DeviceInfo:
      type: object
      description: Device information
      properties:
        itemId:
          type: integer
          format: uint32
          description: Device item ID
        tfType:
          type: integer
          format: uint8
          description: Translation formula type
        class:
          $ref: '#/components/schemas/DeviceClass'
        zoneCount:
          type: integer
          format: uint8
          description: Number of zones
        zones:
          type: array
          items:
            type: object
            properties:
              zoneLength:
                type: integer
                format: uint8
              zone:
                type: string

    # --------------------------------------------------------------------------
    # TIME SCHEMAS
    # --------------------------------------------------------------------------
    TimezonePayload:
      type: object
      description: Timezone request payload
      properties:
        timezone:
          type: string
          description: IANA timezone name (e.g., "Europe/Paris")
          example: "Europe/Paris"

    TimePayload:
      type: object
      description: Time response payload
      properties:
        offset:
          type: integer
          format: int32
          description: UTC offset in seconds
        timestamp:
          type: integer
          format: uint32
          description: Unix timestamp

    # --------------------------------------------------------------------------
    # CALENDAR SCHEMAS
    # --------------------------------------------------------------------------
    PlanningPayload:
      type: object
      description: |
        SET_ZONE_PLANNING (0x00) payload. Weekly setpoints with optional trailing exceptions.
        Format: [zoneID_len(1)][zoneID][mode(1)][7×{pointCount(1),[time(1),value(1)]×N}]
        Optional trailing block: [exceptionCount(1)][start(8 LE),end(8 LE),value(1)]×N
        If no data remains after 7-day setpoints, NRF assumes 0 exceptions (backward-compatible).
      properties:
        zoneIdLength:
          type: integer
          format: uint8
          description: Length of zone ID string
        zoneId:
          type: string
          description: Zone ID as ASCII string
        mode:
          type: integer
          format: uint8
          description: Operating mode (0x00 = hysteresis, 0x01 = pilot wire)
          enum: [0x00, 0x01]
        days:
          type: array
          description: 7 days of setpoints (Mon-Sun)
          items:
            type: object
            properties:
              pointCount:
                type: integer
                format: uint8
              points:
                type: array
                items:
                  $ref: '#/components/schemas/SchedulePoint'
        exceptionCount:
          type: integer
          format: uint8
          description: Optional — number of bundled exceptions (0 if absent)
        exceptions:
          type: array
          description: Optional — bundled exceptions after the 7-day setpoints
          items:
            $ref: '#/components/schemas/Exception'

    SchedulePoint:
      type: object
      description: Schedule point for temperature planning
      properties:
        time:
          type: integer
          format: uint8
          description: End time in minutes divided by 10 (e.g., 60 = 10:00)
        setpoint:
          type: integer
          format: uint8
          description: |
            For hysteresis mode: Temperature in Celsius × 2 (e.g., 42 = 21°C)
            For pilot wire mode: Pilot wire mode code

    ExceptionsPayload:
      type: object
      description: |
        SET_ZONE_EXCEPTIONS (0x01) / exception event (0x09) payload.
        Includes factor field for multi-factor zone support.
        Format: [zoneID_len(1)][zoneID][mode(1)][factor_len(1)][factor][exceptionCount(1)][start(8 LE),end(8 LE),value(1)]×N
      properties:
        zoneIdLength:
          type: integer
          format: uint8
          description: Length of zone ID string
        zoneId:
          type: string
          description: Zone ID as ASCII string
        mode:
          type: integer
          format: uint8
          description: Operating mode (0x00 = hysteresis, 0x01 = pilot wire)
        factorLength:
          type: integer
          format: uint8
          description: Length of factor string
        factor:
          type: string
          description: Factor string (e.g. "TMP", "BRI", "BRIEXT")
        exceptionCount:
          type: integer
          format: uint8
          description: Number of exceptions
        exceptions:
          type: array
          items:
            $ref: '#/components/schemas/Exception'

    Exception:
      type: object
      description: Temperature exception period
      properties:
        start:
          type: integer
          format: uint64
          description: Start Unix timestamp (8 bytes, little-endian)
        end:
          type: integer
          format: uint64
          description: End Unix timestamp (8 bytes, little-endian)
        setpoint:
          type: integer
          format: uint8
          description: Temperature setpoint (Celsius × 2)

    PlanningGroupPayload:
      type: object
      description: |
        SYNC_PLANNING_GROUP (0x06) payload. Full group metadata with embedded plannings list.
        Format: [op(1)][groupID_len(1)][groupID][name_len(1)][name][activated(1)]
        [num_plannings(1)]{[planningID_len(1)][planningID][zoneID_len(1)][zoneID][factor_len(1)][factor]}×N
      properties:
        eventOp:
          type: integer
          format: uint8
          description: Operation (0x00 = create, 0x01 = update, 0x02 = remove)
          enum: [0x00, 0x01, 0x02]
        groupIdLength:
          type: integer
          format: uint8
          description: Length of group ID string (MongoDB ObjectID hex = 24 bytes)
        groupId:
          type: string
          description: Group ID as ASCII string
        nameLength:
          type: integer
          format: uint8
          description: Length of group name string
        groupName:
          type: string
          description: Group name as ASCII string
        groupActivated:
          type: integer
          format: uint8
          description: Activation status (0x00 = disabled, 0x01 = enabled)
        numPlannings:
          type: integer
          format: uint8
          description: Number of embedded planning entries
        plannings:
          type: array
          description: Embedded planning entries
          items:
            type: object
            properties:
              planningIdLength:
                type: integer
                format: uint8
              planningId:
                type: string
                description: Planning ID (MongoDB ObjectID hex)
              zoneIdLength:
                type: integer
                format: uint8
              zoneId:
                type: string
              factorLength:
                type: integer
                format: uint8
              factor:
                type: string
                description: Factor (e.g. "TMP", "BRI", "BRIEXT")

    GroupIdPayload:
      type: object
      description: |
        Group ID payload for activate/deactivate events (0x08, 0x0A).
        Body is raw group ID string (MongoDB ObjectID hex, e.g. "507f1f77bcf86cd799439014").
      properties:
        groupId:
          type: string
          description: Group ID as raw ASCII string

    GroupsHashPayload:
      type: object
      description: |
        SYNC_GROUPS_HASH (0x0C) payload.
        4-byte little-endian CRC32-IEEE hash of the bridge's planning group state.
        Hash input: groups sorted by ID, each [groupID][name][activated(0/1)][numSchedules]
        then schedules sorted by ID, each [scheduleID][zoneID][factor].
        Hash 0x00000000 means no groups stored.
      properties:
        hash:
          type: integer
          format: uint32
          description: CRC32-IEEE hash (4 bytes, little-endian)

    # --------------------------------------------------------------------------
    # TELEMETRY SCHEMAS
    # --------------------------------------------------------------------------
    TelemetryPayload:
      type: object
      description: Telemetry data payload
      properties:
        timestamp:
          type: integer
          format: uint64
          description: Unix timestamp (8 bytes)
        dataType:
          type: integer
          format: uint8
          description: Data type (0 = Float64, 1 = String)
          enum: [0, 1]
        data:
          type: string
          description: Data value as string representation

    # --------------------------------------------------------------------------
    # TERMINAL SCHEMAS
    # --------------------------------------------------------------------------
    AddInternalSensorPayload:
      type: object
      description: |
        Payload for DEV_ADD_INTERNAL_*_SENSOR (0x08=TMP, 0x09=HUM, 0x0A=COV, 0x0B=NOX).
        Registers an internal sensor on the bridge with its zone and item ID.
        Binary layout: [zoneIdLen: 1][zoneId: N][itemIdLen: 1][itemId: N]
      properties:
        zoneIdLength:
          type: integer
          format: uint8
          description: Length of zone ID string
        zoneId:
          type: string
          description: Zone ID as ASCII string
        itemIdLength:
          type: integer
          format: uint8
          description: Length of item ID string
        itemId:
          type: string
          description: Item ID as ASCII string

    RemoveInternalSensorPayload:
      type: object
      description: |
        DEV_REMOVE_INTERNAL_SENSORS (0x0E) payload.
        Removes all internal sensors from a zone on the bridge.
        Binary layout: [zoneIdLen: 1][zoneId: N]
      properties:
        zoneIdLength:
          type: integer
          format: uint8
          description: Length of zone ID string
        zoneId:
          type: string
          description: Zone ID as ASCII string

    UpdateZoneInternalSensorPayload:
      type: object
      description: |
        DEV_UPDATE_ZONE_INTERNAL_SENSORS (0x0C) payload.
        Updates the zone assignment for an internal sensor on the bridge.
        Binary layout: [oldZoneIdLen: 1][oldZoneId: N][newZoneIdLen: 1][newZoneId: N][itemIdLen: 1][itemId: N]
      properties:
        oldZoneIdLength:
          type: integer
          format: uint8
          description: Length of old zone ID string
        oldZoneId:
          type: string
          description: Old zone ID as ASCII string
        newZoneIdLength:
          type: integer
          format: uint8
          description: Length of new zone ID string
        newZoneId:
          type: string
          description: New zone ID as ASCII string
        itemIdLength:
          type: integer
          format: uint8
          description: Length of item ID string
        itemId:
          type: string
          description: Item ID as ASCII string

    TerminalSensorDataPayload:
      type: object
      description: |
        Terminal sensor data published on TerminalEvents.
        Bridge-manager forwards this as-is via DataReceived(bridgeID, "MQTT", data).
        Binary layout: [itemIdLen: 1][itemId: N][value: ASCII float string, e.g. "21.5"]
      properties:
        itemIdLength:
          type: integer
          format: uint8
          description: Length of item ID string
        itemId:
          type: string
          description: Item ID as ASCII string (same ID sent during AddInternalSensor)
        value:
          type: string
          description: Sensor value as ASCII float string (e.g. "21.5")

    # --------------------------------------------------------------------------
    # UI SCHEMAS
    # --------------------------------------------------------------------------
    BuildingIdPayload:
      type: object
      description: Building ID payload
      properties:
        buildingId:
          type: string
          description: Building ID as ASCII string

    BuildingNamePayload:
      type: object
      description: Building name payload
      properties:
        buildingName:
          type: string
          description: Building name as ASCII string

    ZoneListPayload:
      type: object
      description: Zone list payload
      properties:
        zones:
          type: array
          items:
            $ref: '#/components/schemas/ZoneInfo'

    ZoneInfo:
      type: object
      description: Zone information
      properties:
        idLength:
          type: integer
          format: uint8
          description: Length of zone ID
        id:
          type: string
          description: Zone ID as ASCII string
        typeLength:
          type: integer
          format: uint8
          description: Length of zone type
        type:
          type: string
          description: Zone type (e.g., "heating", "cooling")
        nameLength:
          type: integer
          format: uint8
          description: Length of zone name
        name:
          type: string
          description: Zone display name

    FullUiInfoPayload:
      type: object
      description: |
        Full UI information payload.
        Binary layout: [weather: 8 bytes] [sunrise: 8 bytes] [sunset: 8 bytes] [buildingNameLength: 1 byte] [buildingName: N bytes] [zones...]
      properties:
        temperature:
          type: number
          format: float
          description: Temperature in Celsius (4 bytes, IEEE 754 float32)
        humidity:
          type: integer
          format: uint8
          minimum: 0
          maximum: 100
          description: Relative humidity percentage (1 byte)
        iconCode:
          type: string
          minLength: 3
          maxLength: 3
          description: Weather icon code (3 bytes ASCII, e.g., "01d", "10n")
        sunrise:
          type: integer
          format: uint64
          description: Sunrise Unix timestamp (8 bytes)
        sunset:
          type: integer
          format: uint64
          description: Sunset Unix timestamp (8 bytes)
        buildingNameLength:
          type: integer
          format: uint8
          description: Length of building name
        buildingName:
          type: string
          description: Building name as ASCII string
        zones:
          type: array
          items:
            $ref: '#/components/schemas/ZoneInfo'

    WeatherPayload:
      type: object
      description: |
        Weather data payload (8 bytes total, raw data without length prefixes).
        Binary layout: [temperature: 4 bytes float32] [humidity: 1 byte uint8] [iconCode: 3 bytes ASCII]
      properties:
        temperature:
          type: number
          format: float
          description: Temperature in Celsius (4 bytes, IEEE 754 float32)
        humidity:
          type: integer
          format: uint8
          minimum: 0
          maximum: 100
          description: Relative humidity percentage (1 byte)
        iconCode:
          type: string
          minLength: 3
          maxLength: 3
          description: Weather icon code (3 bytes ASCII, e.g., "01d", "10n")
          example: "01d"

    SunTimesPayload:
      type: object
      description: |
        Sunrise and sunset times payload (16 bytes total, raw data).
        Binary layout: [sunrise: 8 bytes uint64] [sunset: 8 bytes uint64]
      properties:
        sunrise:
          type: integer
          format: uint64
          description: Sunrise Unix timestamp (8 bytes)
        sunset:
          type: integer
          format: uint64
          description: Sunset Unix timestamp (8 bytes)
